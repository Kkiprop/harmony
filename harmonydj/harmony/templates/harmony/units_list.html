{% extends 'harmony/base.html' %}
{% load static %}

{% block content %}
<section class="pt-44 pb-24 bg-white" x-data="{
    active: 'two',
    plans: {
        two: {
            label: '2 Bedroom',
            size: '146 SQ.M. / 1,572 SQ.FT.',
            floor: '{% static 'Harmony_2_bedroom_floor.png' %}'
        },
        three: {
            label: '3 Bedroom + SQ',
            size: '235 SQ.M. / 2,530 SQ.FT.',
            floor: '{% static 'Harmony_3_bedroom_floor.png' %}'
        }
    }
}">
    <div class="container mx-auto px-6">
        
        <div class="max-w-3xl mb-16">
            <p class="text-gold font-bold tracking-[0.5em] text-[10px] uppercase mb-4">Floor Plans</p>
            <h1 class="brand-font text-5xl md:text-7xl font-light text-gray-900 leading-tight">
                Residence <br> <span class="italic text-gray-400">Floor Plans</span>
            </h1>
            <p class="text-gray-500 mt-6 text-lg font-light">
                Switch between our two residence types to view each architectural floor plan.
            </p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-4 mb-10 border-y border-gray-100 py-6">
            <div class="flex gap-4">
                <button @click="active = 'two'"
                    :class="active === 'two' ? 'bg-[#b18b52] text-white border-[#b18b52]' : 'bg-white text-gray-900 border-gray-200'"
                    class="px-8 py-3 text-[11px] font-bold uppercase tracking-widest border transition-all duration-300 rounded-sm">
                    2 Bedroom
                </button>
                <button @click="active = 'three'"
                    :class="active === 'three' ? 'bg-[#b18b52] text-white border-[#b18b52]' : 'bg-white text-gray-900 border-gray-200'"
                    class="px-8 py-3 text-[11px] font-bold uppercase tracking-widest border transition-all duration-300 rounded-sm">
                    3 Bedroom + SQ
                </button>
            </div>
            <div class="w-full text-center mt-3 md:mt-0 md:w-auto">
                <span class="text-[11px] font-bold text-gray-500 uppercase tracking-widest" x-text="plans[active].size"></span>
            </div>
        </div>

        <div class="bg-[#FAF9F6] rounded-[2rem] p-6 md:p-12 border border-gray-100 shadow-sm">
            <div class="text-center mb-8">
                <p class="uppercase tracking-[0.3em] text-[10px] text-gold font-bold mb-2">Selected Plan</p>
                <h2 class="brand-font text-3xl md:text-4xl font-light text-gray-900" x-text="plans[active].label + ' Floor Plan'"></h2>
            </div>
            <div class="bg-white rounded-[1.5rem] p-6 md:p-10 border border-gray-100 overflow-hidden flex justify-center items-center">
                <img :src="plans[active].floor"
                     :alt="plans[active].label + ' Floor Plan'"
                     :key="active"
                     x-transition:enter="transition ease-out duration-700 transform"
                     x-transition:enter-start="opacity-0 translate-y-10 scale-95"
                     x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                     class="max-w-full h-auto object-contain max-h-[760px]">
            </div>
        </div>
    </div>
</section>
{% endblock %}
